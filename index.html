<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도망가는 버튼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* 도망가는 버튼이 화면 밖으로 나가지 않게 */
        }

        #catchMeBtn {
            position: absolute;
            transition: all 0.2s ease-in-out; /* 부드러운 움직임 효과 */
            padding: 1rem 2rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
            background-color: #3b82f6; /* bg-blue-500 */
            border-radius: 9999px; /* rounded-full */
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            user-select: none; /* 텍스트 선택 방지 */
        }

        #catchMeBtn:hover {
            background-color: #2563eb; /* bg-blue-600 */
        }

        #messageContainer {
            position: absolute;
            bottom: 2rem;
            text-align: center;
            width: 100%;
            pointer-events: none; /* 메시지가 버튼 클릭을 방해하지 않게 */
        }

        .message {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #10b981; /* bg-emerald-500 */
            color: white;
            border-radius: 0.5rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            transform: translateY(20px);
            /* animation will be added via JS */
        }

        @keyframes slideUpFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        #birthdayPopup, #secondPopup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            transform: scale(0.5);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy effect */
        }

        #birthdayPopup.show, #secondPopup.show {
            display: flex;
        }

        #birthdayPopup.show .popup-content, #secondPopup.show .popup-content {
            transform: scale(1);
            opacity: 1;
        }

        .close-btn {
            margin-top: 1.5rem;
            padding: 0.5rem 1.5rem;
            background-color: #ec4899; /* bg-pink-500 */
            color: white;
            border: none;
            border-radius: 9999px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .close-btn:hover {
            background-color: #db2777; /* bg-pink-600 */
        }
    </style>
</head>
<body>

    <!-- 초기 위치를 중앙으로 설정 -->
    <button id="catchMeBtn" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
        저를 클릭해 보세요!
    </button>

    <div id="messageContainer"></div>

    <div id="birthdayPopup">
        <div class="popup-content">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">🎉 서프라이즈! 🎉</h2>
            <p class="text-xl text-gray-600 mb-2">오늘은 정소연 생일이에요~</p>
            <p class="text-lg text-pink-500 font-semibold mb-6">축하해볼까요?</p>
            <button class="close-btn" onclick="openSecondPopup()">축하하기 🎂</button>
        </div>
    </div>

    <div id="secondPopup">
        <div class="popup-content">
            <h2 class="text-2xl font-bold text-gray-800 mb-6" style="line-height: 1.4;">뭐해요?<br>어서 축하하러 가지 않고?🏃‍♀️💨</h2>
            <button class="close-btn" onclick="closeSecondPopup()">다시하기</button>
        </div>
    </div>

    <script>
        const button = document.getElementById('catchMeBtn');
        const messageContainer = document.getElementById('messageContainer');
        const birthdayPopup = document.getElementById('birthdayPopup');
        
        let escapeCount = 0;
        const maxEscapes = 2;
        let isCaught = false;

        // 마우스가 버튼에 올라갈 때 도망가는 로직
        button.addEventListener('mouseover', function() {
            if (escapeCount < maxEscapes && !isCaught) {
                // 창의 너비와 높이를 가져옵니다.
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // 버튼의 크기를 가져옵니다.
                const btnWidth = button.offsetWidth;
                const btnHeight = button.offsetHeight;

                // 새 위치를 계산합니다. 화면 밖으로 나가지 않도록 여백을 둡니다.
                const newX = Math.random() * (windowWidth - btnWidth - 40) + 20; // 좌우 20px 여백
                const newY = Math.random() * (windowHeight - btnHeight - 40) + 20; // 상하 20px 여백

                // 버튼 위치 업데이트 (transform 초기화 필요)
                button.style.transform = 'none';
                button.style.left = `${newX}px`;
                button.style.top = `${newY}px`;
                
                escapeCount++;

                // 도망갈 때마다 텍스트 변경
                if (escapeCount === 1) {
                    button.textContent = "어림없지!";
                    button.style.backgroundColor = "#ef4444"; // bg-red-500
                } else if (escapeCount === 2) {
                    button.textContent = "잡아보시지!";
                    button.style.backgroundColor = "#f59e0b"; // bg-amber-500
                }
            }
        });

        // 버튼 클릭 이벤트 처리
        button.addEventListener('click', function() {
            if (escapeCount >= maxEscapes) {
                isCaught = true;
                
                // Show the popup instead of the previous message
                birthdayPopup.classList.add('show');
            }
        });

        // 두 번째 팝업 열기 함수 (첫 번째 팝업 닫힘)
        function openSecondPopup() {
            birthdayPopup.classList.remove('show');
            setTimeout(() => {
                document.getElementById('secondPopup').classList.add('show');
            }, 300); // 첫 번째 팝업이 닫히고 자연스럽게 뜨도록 약간의 딜레이
        }

        // 두 번째 팝업 닫기 및 버튼 초기화
        function closeSecondPopup() {
            document.getElementById('secondPopup').classList.remove('show');
            setTimeout(() => {
                resetButton(); 
            }, 300);
        }

        // 메시지 표시 함수 (더 이상 사용되지 않지만 남겨둡니다)
        function showMessage(text) {
            const msgElement = document.createElement('div');
            msgElement.className = 'message';
            msgElement.textContent = text;
            msgElement.style.animation = 'slideUpFadeIn 3s forwards';
            
            messageContainer.appendChild(msgElement);
            
            // 애니메이션이 끝나면 요소 제거
            setTimeout(() => {
                msgElement.remove();
            }, 3000);
        }

        // 버튼 초기화 함수
        function resetButton() {
            escapeCount = 0;
            isCaught = false;
            button.textContent = "다시 해볼까요?";
            button.style.backgroundColor = "#3b82f6"; // bg-blue-500
            
            // 중앙으로 복귀
            button.style.left = '50%';
            button.style.top = '50%';
            button.style.transform = 'translate(-50%, -50%)';
        }

        // 모바일 기기(터치스크린) 지원
        button.addEventListener('touchstart', function(e) {
            if (escapeCount < maxEscapes && !isCaught) {
                e.preventDefault(); // 기본 터치 이벤트(클릭으로 이어지는) 방지
                
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                const btnWidth = button.offsetWidth;
                const btnHeight = button.offsetHeight;

                const newX = Math.random() * (windowWidth - btnWidth - 40) + 20;
                const newY = Math.random() * (windowHeight - btnHeight - 40) + 20;

                button.style.transform = 'none';
                button.style.left = `${newX}px`;
                button.style.top = `${newY}px`;
                
                escapeCount++;

                if (escapeCount === 1) {
                    button.textContent = "어림없지!";
                    button.style.backgroundColor = "#ef4444";
                } else if (escapeCount === 2) {
                    button.textContent = "잡아보시지!";
                    button.style.backgroundColor = "#f59e0b";
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
